name: Django Backend CI

# Робот запускается, когда ты делаешь push (отправляешь код) в главные ветки
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # Запускаем проверку на чистой системе Linux (Ubuntu)
    runs-on: ubuntu-latest

    steps:
    # Шаг 1: Скачиваем твой код из репозитория GitHub
    - name: Check out repository code
      uses: actions/checkout@v4

    # Шаг 2: Включаем Python версии 3.10
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Шаг 3: Обновляем pip и устанавливаем зависимости из твоего requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Шаг 4: Запускаем тесты Django, чтобы убедиться, что код пуленепробиваемый
    - name: Run Django Tests
      run: |
        python manage.py test