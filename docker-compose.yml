version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: ogulov_postgres_db
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_HOST=db 
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ogulov_backend_api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  postgres_data:
