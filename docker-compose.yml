

services:
  # 1. БАЗА ДАННЫХ (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: ogulov_postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Порты наружу НЕ выводим. Для локального дебага раскомментируйте строку ниже:
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

# Карман для данных остается прежним
volumes:
  postgres_data:
